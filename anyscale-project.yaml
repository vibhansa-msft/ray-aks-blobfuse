name: vibhansa-ray-aks-anyscale

# Anyscale project definition to run train_new.py as a Ray Job.
# Fill the INSTANCE_TYPE and IMAGE with values available in your Anyscale org.
cluster_envs:
  - name: cpu-training
    # Base runtime; override below in jobs if needed.
    runtime_env:
      pip:
        - torch>=2.1.0
        - transformers>=4.35.0
        - datasets>=2.14.5
        - pyarrow>=14.0.0
        - pandas>=2.0.0
        - bitsandbytes>=0.41.0
        - accelerate>=0.24.0
        - sentencepiece>=0.1.99
        - ray[tune]>=2.50.0
        - requests>=2.28.0
        - pillow>=10.0.0
        - huggingface_hub>=0.19.0
      env_vars:
        DATA_DIR: "abfs://datasets@vibhansaanyscalestorage.dfs.core.windows.net/c4"
        CHECKPOINT_DIR: "abfs://datasets@vibhansaanyscalestorage.dfs.core.windows.net/checkpoints"
        HF_TOKEN: ""
        APP_DIR: "/app"
        NUM_WORKERS: "20"
        PYTHONPATH: "/app"
        TRANSFORMERS_OFFLINE: "0"
        RAY_LOGGING_LEVEL: "ERROR"
        RAY_LOG_TO_DRIVER: "false"
        RAY_DISABLE_IMPORT_WARNING: "1"
    config:
      # Replace with a real Anyscale cloud/instance/image for your org.
      cloud: "/subscriptions/68e5d74d-cc6b-4be6-9606-cd1c77fa55f0/resourcegroups/vibhansa-ray-aks-rg/providers/anyscale.platform/clouds/vibhansaanycloud1"
      head_node_type: "Standard_D48ds_v5"
      worker_node_types:
        - name: worker-default
          instance_type: "Standard_D48ds_v5"
          min_workers: 0
          max_workers: 20
          use_spot: false
      autotermination_minutes: 30

jobs:
  - name: train-new
    cluster_env: cpu-training
    working_dir: "./app/scale_train"
    entrypoint: "python train.py"
    runtime_env:
      env_vars:
        NUM_WORKERS: "20"

ingress-nginx:
  enabled: true
  controller:
    admissionWebhooks:
      enabled: false
    service:
      type: LoadBalancer
      annotations:
        service.beta.kubernetes.io/azure-load-balancer-health-probe-request-path: "/healthz"
