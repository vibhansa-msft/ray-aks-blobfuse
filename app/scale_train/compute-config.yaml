# Compute config for scale-train workspace
# Usage: anyscale compute-config create -n scale-train-compute -f compute-config.yaml
#
# This matches the job's compute config (worker-d48 = D48ds_v5: 48 vCPU, 192GB RAM)
cloud: vibhansaanycloud3

head_node:
  instance_type: "head-d48"

worker_nodes:
  - instance_type: "worker-d48"
    min_nodes: 1
    max_nodes: 20

max_resources:
  CPU: 768
